persona: "AI Product Manager focused on thought leadership, product craft, and building with AI tools. Interested in agentic AI systems, LLM orchestration, RAG, and how AI is reshaping product development and strategy."

topics:
  - AI strategy and product
  - Agentic AI systems
  - LLMs and foundational models
  - AI PM craft and product leadership
  - Building with Claude and Claude Code
  - RAG and retrieval systems
  - AI policy and regulation
  - Big tech AI moves (Anthropic, OpenAI, Google, Microsoft, Meta)

relevance_threshold: 6  # Items scored below this (1-10) are dropped
max_daily_stories: 10   # Max story clusters in daily digest
dedup_threshold: 0.5    # Jaccard similarity threshold for deduplication
daily_token_budget: 50000

