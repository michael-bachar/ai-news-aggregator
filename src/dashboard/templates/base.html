<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Digest{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #F7F6F2;
      --surface:       #FFFFFF;
      --border:        #E6E2D9;
      --border-light:  #EDE9E1;
      --text:          #1A1917;
      --text-body:     #3A3631;
      --text-muted:    #7A7469;
      --text-light:    #A9A39B;
      --accent:        #B45309;
      --accent-bg:     #FFFBEB;
      --accent-border: #F59E0B;
      --accent-text:   #92400E;
      --shadow-sm:     0 1px 2px rgba(0,0,0,0.05);
      --shadow:        0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-md:     0 2px 8px rgba(0,0,0,0.07), 0 8px 24px rgba(0,0,0,0.05);
      --radius:        12px;
      --radius-sm:     6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Layout ──────────────────────────────── */
    .page-wrapper {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 6rem;
    }

    /* ── Header ──────────────────────────────── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.75rem 0 1.5rem;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 2.25rem;
    }

    .site-wordmark {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .wordmark-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .site-nav {
      display: flex;
      gap: 0.25rem;
    }

    .site-nav a {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.375rem 0.875rem;
      border-radius: 999px;
      transition: color 0.15s, background 0.15s;
      letter-spacing: 0.01em;
    }

    .site-nav a:hover {
      color: var(--text);
      background: var(--border-light);
    }

    .site-nav a.active {
      color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow-sm), 0 0 0 1px var(--border);
      font-weight: 600;
    }

    /* ── Story Card ──────────────────────────── */
    .story-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      margin-bottom: 1.125rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .story-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .story-theme-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .story-headline {
      font-size: 1.125rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.625rem;
    }

    .story-synthesis {
      font-size: 0.9375rem;
      color: var(--text-body);
      line-height: 1.75;
      margin-bottom: 1rem;
      max-width: 62ch;
    }

    /* ── Why it matters ──────────────────────── */
    .why-matters {
      border-left: 3px solid var(--accent-border);
      background: var(--accent-bg);
      padding: 0.75rem 1rem;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 1rem;
    }

    .why-matters-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .why-matters-text {
      font-size: 0.875rem;
      color: var(--accent-text);
      line-height: 1.65;
    }

    /* ── Sources ─────────────────────────────── */
    .story-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      padding-top: 0.25rem;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.25rem 0.625rem 0.25rem 0.4rem;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .source-pill:hover {
      color: var(--text);
      border-color: var(--text-light);
      background: var(--border-light);
    }

    .source-pill img {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
      display: block;
    }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
    }

    .empty-state p { font-size: 0.9375rem; line-height: 1.75; }
    .empty-state p + p { margin-top: 0.5rem; }

    .empty-state code {
      font-size: 0.8125rem;
      background: var(--border-light);
      padding: 0.125rem 0.4rem;
      border-radius: 4px;
      color: var(--text);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <a href="/" class="site-wordmark">
        <span class="wordmark-dot"></span>
        AI Digest
      </a>
      <nav class="site-nav">
        <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Daily</a>
        <a href="/weekly" {% if request.url.path == "/weekly" %}class="active"{% endif %}>Weekly</a>
      </nav>
    </header>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
