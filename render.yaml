services:
  - type: web
    name: ai-news-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.dashboard.app:app --host 0.0.0.0 --port $PORT
    disk:
      name: news-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/news.db
      - key: CONFIG_PATH
        value: config.yaml
